<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="LidaMarket — стильная одежда из Китая по лучшим ценам. Каталог, скидки, дропшиппинг.">
    <title>LidaMarket — Магазин стильной одежды</title>

    <!-- Telegram Mini App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="/src/styles/index.css">
    <link rel="stylesheet" href="/src/styles/components.css">
    <link rel="stylesheet" href="/src/styles/pages.css">
</head>
<body>
    <div id="app">
        <!-- Loading screen -->
        <div id="loading-screen" class="loading-screen">
            <div class="loading-logo">
                <span class="loading-icon">🛍</span>
                <h1 class="loading-title">LidaMarket</h1>
                <p class="loading-subtitle">Загружаем магазин...</p>
                <div class="loading-spinner"></div>
            </div>
        </div>

        <!-- Main content (hidden until loaded) -->
        <div id="main-content" class="main-content hidden">
            <!-- Header -->
            <header id="app-header" class="app-header">
                <div class="header-inner">
                    <button id="header-back" class="header-btn hidden" aria-label="Назад">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                    </button>
                    <h1 id="header-title" class="header-title">LidaMarket</h1>
                    <div class="header-actions">
                        <button id="header-search-btn" class="header-btn" aria-label="Поиск">
                            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
                        </button>
                        <button id="header-cart-btn" class="header-btn cart-btn" aria-label="Корзина">
                            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
                            <span id="cart-badge" class="cart-badge hidden">0</span>
                        </button>
                    </div>
                </div>
            </header>

            <!-- Page container -->
            <main id="page-container" class="page-container"></main>

            <!-- Bottom Navigation -->
            <nav id="bottom-nav" class="bottom-nav">
                <button class="nav-item active" data-page="home" id="nav-home">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                    <span>Главная</span>
                </button>
                <button class="nav-item" data-page="catalog" id="nav-catalog">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
                    <span>Каталог</span>
                </button>
                <button class="nav-item" data-page="favorites" id="nav-favorites">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
                    <span>Избранное</span>
                </button>
                <button class="nav-item" data-page="cart" id="nav-cart">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
                    <span>Корзина</span>
                </button>
                <button class="nav-item" data-page="profile" id="nav-profile">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    <span>Профиль</span>
                </button>
            </nav>
        </div>

        <!-- Toast container -->
        <div id="toast-container" class="toast-container"></div>
    </div>

    <script type="module" src="/src/main.js"></script>
</body>
</html>
